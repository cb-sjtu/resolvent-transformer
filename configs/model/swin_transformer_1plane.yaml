_target_: src.models.base.swin_transformer.SwinTransformer2DWithMerging

input_shape: [256, 256]  # 2D shape (z, x) - using downsampled resolution
sequence_length: 5
prediction_horizon: 1
num_channels: 3  # 1 plane × 3 fields (u,v,w) = 3 channels
patch_size: [4, 4]
embed_dim: 128
depths: [2, 2, 2, 4, 6, 4, 2, 2, 2]  # encoder: [2,2,4], latent: [6], decoder: [4,2,2]
num_heads: 64
window_size: [8, 8]
mlp_ratio: 4.0
qkv_bias: true
drop_rate: 0.1
attn_drop_rate: 0.1
drop_path_rate: 0.1
patch_norm: true
final_upsample: "expand_first"
use_patch_merging: true
