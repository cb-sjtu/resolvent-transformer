_target_: src.models.base.swin_transformer.SwinTransformerAuto

input_shape: [256, 256]  # 2D shape (z, x) - z=512/4=128, x=384/4=96
sequence_length: 10
prediction_horizon: 1
patch_size: [4, 4]
embed_dim: 128
depths: [2, 2, 4, 6, 4, 2, 2]  # encoder: [2,4,4], latent: [6], decoder: [4,4,2]
num_heads: 8
window_size: [8, 8]
mlp_ratio: 4.0
qkv_bias: true
drop_rate: 0.1
attn_drop_rate: 0.1
drop_path_rate: 0.1

# Control which model to use
use_patch_merging: true  # true: SwinTransformer2DWithMerging, false: SwinTransformer2D
