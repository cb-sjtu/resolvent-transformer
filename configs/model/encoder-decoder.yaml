_target_: src.models.encoder_decoder.EncoderDecoder

encoder_in_proj:
  _target_: torch.nn.Linear
  in_features: 2
  out_features: ${model.encoder.layer.d_model}

decoder_in_proj:
  _target_: torch.nn.Linear
  in_features: 1
  out_features: ${model.decoder.layer.d_model}

encoder:
  _target_: src.models.transformer.TransformerEncoder
  layer:
    _target_: src.models.transformer.TransformerEncoderLayer
    d_model: 128
    nhead: 4
    dim_feedforward: 512  # 128 * 4
  num_layers: 6

decoder:
  _target_: src.models.transformer.TransformerDecoder
  layer:
    _target_: src.models.transformer.TransformerDecoderLayer
    d_model: 128
    nhead: 4
    dim_feedforward: 512  # 128 * 4
  num_layers: 6


out_proj:
  _target_: torch.nn.Linear
  in_features: ${model.decoder.layer.d_model}
  out_features: 1


compile: true
sdpa: ["cudnn", "efficient", "flash", "math"]
