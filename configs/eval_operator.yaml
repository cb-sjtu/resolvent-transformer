# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults:
  - _self_
  - data/dummy/dummy_ol@data # load from data/dummy/dummy_ol.yaml as data
  - model: encoder-decoder
  - plmodule: operator
  - datamodule: base
  - loss: none
  - opt: default
  - accelerate: default
  - callbacks: default_eval
  - logger: many_loggers # set logger here or use command line (e.g. `python eval.py logger=tensorboard`)
  - trainer: ddp
  - paths: default
  - extras: default
  - hydra: default

  # optional local config for machine/user specific settings
  # it's optional since it doesn't need to exist and is excluded from version control
  - optional local: default

  # debugging config (enable through command line, e.g. `python eval.py debug=default)
  - debug: null

# task name, determines output directory path
task_name: "eval"

# tags to help you identify your experiments
# you can overwrite this in experiment configs
# overwrite from command line with `python eval.py tags="[first_tag, second_tag]"`
tags: ["dev"]

# evaluate on test set, using best model weights achieved during training
# lightning chooses best weights based on the metric specified in checkpoint callback
test: False

# Placeholder for the checkpoint path used when iterating over checkpoints in training logs
ckpt_path: null

paths:
  # Directory containing checkpoints for evaluation
  ckpt_dir: ${paths.output_dir}/checkpoints
  # Path to the training configuration file used for generating checkpoints
  train_conf: ${paths.output_dir}/.hydra/train_config.yaml

# seed for random number generators in pytorch, numpy and python.random
seed: 42

print_lv: 1

log_project: "example"
