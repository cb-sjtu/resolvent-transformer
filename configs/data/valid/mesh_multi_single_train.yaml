mesh_multi_single_train:  
  name: valid_mesh_multi_single_train
  description: single mesh in the list, using the data from training
  task: mesh_list
  data_folder: ${data.data_folder}
  geometries: ${data.train_geometries}
  materials: ${data.train_materials}
  num_meshes: 1
  same_geometry: True
  snapshot_range: [1, 11]
  num_workers: ${data.num_workers}
  infinite: True
  print_info: False