mesh_multi_single:  
  name: valid_mesh_multi_single
  description: single mesh in the list, but using the same generator as multi-mesh list. bs = None in consistent with others
  task: mesh_list
  data_folder: ${data.data_folder}
  geometries: ${data.valid_geometries}
  materials: ${data.valid_materials}
  num_meshes: 1
  same_geometry: True
  snapshot_range: [1, 11]
  num_workers: ${data.num_workers}
  infinite: True
  print_info: False