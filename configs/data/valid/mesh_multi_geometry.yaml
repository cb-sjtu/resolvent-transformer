mesh_multi_geometry:  
  name: valid_mesh_multi_geometry
  description: multiple meshes in the list, from different geometries. bs = None
  task: mesh_list
  data_folder: ${data.data_folder}
  geometries: ${data.valid_geometries}
  materials: ${data.valid_materials}
  num_meshes: 3
  same_geometry: False
  snapshot_range: [1, 11]
  num_workers: ${data.num_workers}
  infinite: True
  print_info: False