defaults:
  - ../dataloader@_here_
  - train/flow_1plane_train@train.flow_sequence_1plane
  - valid/flow_1plane_valid@valid.flow_sequence_1plane
  - test/flow_1plane_test@test.flow_sequence_1plane
  - _self_

data_folder: /home/sh/CB/icon-thewell-dev/data/preprocessed_flow/new/
batch_size_per_device: 8  # Batch size for 3-channel data

# Time stride settings
time_stride: 5  # Frame spacing (1=consecutive, 2=every other frame, 5=every 5th frame)

# Normalization settings
enable_normalization: true
norm_stats: "norm_stats_3ch_1plane_u-v-w_scale2-3_ylayer2.json"  # Path to 3-channel 1-plane normalization stats file (u,v,w only)
