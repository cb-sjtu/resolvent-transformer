name: flow_sequence_1plane

dataset:
  _target_: src.datasets.flow_sequence_2d.flow_sequence_1plane.FlowSequence1PlaneDataset
  data_dir: ${data.data_folder}
  input_length: 5
  field_names: ["u", "v", "w"]  # 3 fields: u, v, w velocities
  file_pattern: "*u-v-w_scale2-3-1_yslice54*.h5"  # Match y_slice54 uvwp files (will only load u,v,w)
  resolution_scale: [2, 3, 1]  # (z, y, x) downsampling
  y_slice: 54  # 单个y平面索引
  train_ratio: 0.9
  valid_ratio: 0.05
  test_ratio: 0.05
  split: "test"
  enable_normalization: ${data.enable_normalization}
  norm_stats: ${data.norm_stats}

num_workers: ${data.num_workers}
pin_memory: ${data.pin_memory}
batch_size_per_device: ${data.batch_size_per_device}
enable_device_seed: ${data.test_enable_device_seed}
base_seed: ${data.test_base_seed}
