name: flow_sequence_2d

dataset:
  _target_: src.datasets.flow_sequence_2d.fast_flow_dataset.FastFlowSequence2DDataset
  data_dir: "/home/sh/CB/icon-thewell-dev/data/preprocessed_flow"
  input_length: 5
  max_k_steps: ${data.max_k_steps}
  field_name: ["u", "v", "w"]
  file_pattern: "*.h5"
  resolution_scale: [2, 3, 1]  # (z, x, y) downsampling
  y_slice: 5  # Use y_slice 5
  train_ratio: 0.7
  valid_ratio: 0.15
  test_ratio: 0.15
  split: "val"
  norm_stats: ${data.norm_stats}
  enable_normalization: ${data.enable_normalization}

num_workers: ${data.num_workers}
pin_memory: ${data.pin_memory}
batch_size_per_device: ${data.batch_size_per_device}
enable_device_seed: ${data.test_enable_device_seed}
base_seed: ${data.test_base_seed}
