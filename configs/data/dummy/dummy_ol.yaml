defaults:
  - ../dataloader@_here_ # load from parent folder's dataloader.yaml to here
  - train/ol@train.dummy_ol # load config from train/ol.yaml as train.dummy_ol
  - train/ol_large@train.dummy_ol_large # load config from train/ol_large.yaml as train.dummy_ol_large
  - valid/ol@valid.dummy_ol
  - valid/ol_large@valid.dummy_ol_large
  - _self_

data_folder: ${paths.data_dir}/dummy # the placeholder for loading data
batch_size_per_device: 8
