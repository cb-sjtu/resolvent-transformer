#######################################################
# Callback configuration for Flow Swin Transformer project
# This file contains the callbacks used for training the
# Swin Transformer model for flow field prediction
#######################################################

defaults:
  - model_summary
  - print_model
  - save_ckpt
  - save_metric
  - save_batch_info
  - curriculum_logger
  # - viz  # Disabled to avoid matplotlib errors
  - _self_

# Override save_ckpt configuration to fix the ModelCheckpoint error
save_ckpt:
  monitor: "val/loss"  # Monitor validation loss
  mode: "min"  # Lower validation loss is better
