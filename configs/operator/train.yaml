# @package _global_

# Operator model training configuration

# Import operator base configuration
defaults:
  - default                  # Base configuration (in operator directory)
  - model/transformer        # Model configuration
  - data/default             # Data configuration
  - optimizer/default        # Optimizer configuration
  - paths.yaml               # Path configuration
  - extras.yaml              # Extra configuration
  - trainer.yaml             # Trainer configuration
  - logger.yaml              # Logger configuration
  - callbacks: default       # Specialized callbacks (in operator/callbacks directory)
  - _self_                   # Ensure current file has priority

# Task name
task_name: "operator_training"

# Training settings
train: true
test: false
ckpt_path: null

# Print configuration
print_config: true

# Optimization metric (for hyperparameter optimization)
optimized_metric: "valid/loss"

# Tags
tags: ["operator", "development"]

# Dynamic graph compilation cache size limit
dynamo_cache_size_limit: 64

# Random seed
seed: 42

# SDPA configuration
sdpa:
  - math         # Default backend
  - efficient    # Use efficient attention if available
  - flash        # Use flash attention if available

# Print detail level
print_lv: 1 