# @package _global_

# Model configuration
model:
  f_input_dim: 2        # (x,y) sample pairs of input function
  g_input_dim: 1        # x values of target function
  g_output_dim: 1       # y values of target function
  f_seq_len: 100        # Number of sampling points for input function
  g_seq_len: 50         # Number of sampling points for target function
  d_model: 256          # Transformer model dimension
  num_encoder_layers: 4 # Number of encoder layers
  num_decoder_layers: 4 # Number of decoder layers
  num_heads: 1          # Number of attention heads
  d_ff: 1024            # Hidden dimension of feed-forward network
  max_seq_len: 500      # Maximum sequence length for positional encoding
  dropout: 0.1          # Dropout rate 